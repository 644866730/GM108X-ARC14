<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#4a148c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>星符校准</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>In Lak’ech Ala K’in
            <br>你是我，我是另一个你
        </h1>

        <div class="poster-card">
            <img src="seal/index.jpg" alt="星符·天赋印主题图" loading="lazy">
            <div class="poster-caption">
                <span class="poster-title">星符·天赋印</span>
                <span class="poster-meta">142.857 thz · 灵视回溯</span>
            </div>
        </div>

        <div class="input-section">
            <h2>请输入查询日期：</h2>
            <div class="date-input">
                <div>
                    <label for="year">年</label>
                    <select id="year"></select>
                </div>

                <div>
                    <label for="month">月</label>
                    <select id="month"></select>
                </div>

                <div>
                    <label for="day">日</label>
                    <select id="day"></select>
                </div>
            </div>
            <button id="calculate">星符查询</button>
        </div>

        <!-- 添加图片加载状态提示 -->


        <div id="image-status" class="status-message"></div>

        <div class="result-section" id="result">
            <div class="seal-grid">
                <!-- 指引行：日历信息（左）+ 指引位（中）+ KIN信息（右） -->
                <div class="guide-row">
                    <div class="calendar-cell calendar-cell-left" aria-live="polite">
                        <div class="calendar-cell-line calendar-cell-year" id="summary-year"></div>
                        <div class="calendar-cell-note" id="summary-note"></div>
                        <div class="calendar-cell-line" id="summary-month"></div>
                        <div class="calendar-cell-line" id="summary-week"></div>
                        <div class="calendar-cell-line" id="summary-day"></div>
                    </div>
                    <div class="seal guide">
                        <div class="seal-name" id="guide-name"></div>
                        <img id="guide-img" src="" alt="指引位图腾">
                    </div>
                    <div class="calendar-cell calendar-cell-right" aria-live="polite">
                        <div class="calendar-cell-line calendar-cell-main" id="summary-main"></div>
                        <div class="calendar-cell-line calendar-cell-kin" id="summary-kin"></div>
                    </div>
                </div>

                <div class="middle-row">
                    <!-- 挑战位（左） -->
                    <div class="seal challenge">
                        <div class="seal-name" id="challenge-name"></div>
                        <img id="challenge-img" src="" alt="挑战位图腾">
                    </div>

                    <!-- 主印记（中） -->
                    <div class="seal main">
                        <div class="seal-name" id="main-name"></div>
                        <img id="main-img" src="" alt="主印记图腾">
                        <div class="kin-info" id="kin-info"></div>
                    </div>

                    <!-- 支持位（右） -->
                    <div class="seal support">
                        <div class="seal-name" id="support-name"></div>
                        <img id="support-img" src="" alt="支持位图腾">
                    </div>
                </div>

                <!-- 推动位（下） -->
                <div class="seal push">
                    <div class="seal-name" id="push-name"></div>
                    <img id="push-img" src="" alt="推动位图腾">
                </div>

                <!-- 主印记描述区域 -->
                <div class="description-section">
                    <h3>主印记解读</h3>
                    <div class="kin-desc-container">
                        <div class="kin-desc" id="kin-desc"></div>
                    </div>
                </div>

                <!-- 底部附加信息 -->
                <div class="additional-info">
                    <!-- 波符 -->
                    <div class="seal wave">
                        <div class="seal-name" id="wave-name"></div>
                        <img id="wave-img" src="" alt="波符图腾">
                        <div class="wave-info" id="wave-info"></div>
                    </div>

                    <!-- 内在女神 -->
                    <div class="seal goddess">
                        <div class="seal-name" id="goddess-name"></div>
                        <img id="goddess-img" src="" alt="内在女神图腾">
                        <div class="kin-info" id="goddess-info"></div>
                    </div>

                    <!-- PSI -->
                    <div class="seal psi">
                        <div class="seal-name" id="psi-name">PSI</div>
                        <img id="psi-img" src="" alt="PSI图腾">
                        <div class="kin-info" id="psi-info"></div>
                    </div>

                    <!-- 对等KIN -->
                    <div class="seal equivalent">
                        <div class="seal-name" id="equivalent-name">对等Kin</div>
                        <img id="equivalent-img" src="" alt="对等KIN图腾">
                        <div class="kin-info" id="equivalent-info"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部导航栏 -->
    <div class="bottom-nav">
        <a href="index.html" class="nav-item active">
            <i class="nav-icon">🔍</i>
            <span>星符查询</span>
        </a>
        <a href="test.html" class="nav-item">
            <i class="nav-icon">🧭</i>
            <span>测一测</span>
        </a>
        <a href="learn.html" class="nav-item">
            <i class="nav-icon">📘</i>
            <span>学一学</span>
        </a>
        <a href="contact.html" class="nav-item">
            <i class="nav-icon">📞</i>
            <span>联系我</span>
        </a>
    </div>

    <!-- 13月亮历转换器 -->
    <script src="lunar13_converter.js"></script>

    <!-- PSI 数据 -->
    <script src="psi_data.js"></script>

    <!-- 对等KIN计算器 -->
    <script src="equivalent_kin.js"></script>

    <!-- 矩阵数据 -->
    <script src="matrices_data.js"></script>

    <!-- 主脚本 -->
    <script src="script.js"></script>
</body>

</html>
