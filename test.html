<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#4a148c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>测一测 - 玛雅天赋印记</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="test-page">
    <div class="container test-container">
        <header class="test-hero">
            <p class="test-kicker">天赋唤醒系统</p>
            <h1>测一测你的天赋原型</h1>
            <p class="test-intro">四大版本，每版 5 题。每一题对应一个能量中心，完成后生成你的五宫格天赋画像。</p>
        </header>

        <main>
            <section class="test-panel" aria-labelledby="version-title">
                <div class="section-heading">
                    <h2 id="version-title">选择测试版本</h2>
                    <p>按你当前最关心的场景开始。</p>
                </div>
                <div class="version-grid" id="version-grid"></div>
            </section>

            <section class="test-panel quiz-panel" id="quiz-panel" aria-labelledby="quiz-title" hidden>
                <div class="section-heading">
                    <h2 id="quiz-title">开始答题</h2>
                    <p id="quiz-guide"></p>
                </div>
                <form id="quiz-form" class="quiz-form"></form>
                <div class="quiz-actions">
                    <button type="button" class="secondary-action" id="reset-test">重新选择</button>
                    <button type="button" id="show-result">生成五宫格画像</button>
                </div>
                <div class="status-message error" id="quiz-error" role="alert"></div>
            </section>

            <section class="test-panel portrait-panel" id="portrait-panel" aria-labelledby="portrait-title" hidden>
                <div class="section-heading">
                    <p class="test-kicker" id="portrait-version"></p>
                    <h2 id="portrait-title">五宫格天赋画像</h2>
                    <p>你的结果来自五个脉轮题目，每格对应一题。</p>
                </div>
                <div class="portrait-grid" id="portrait-grid"></div>

                <div class="conversion-card">
                    <div>
                        <p class="test-kicker">9.9元天赋说明书</p>
                        <h3>解锁你的完整图腾说明书</h3>
                        <p>包含五宫格图腾解析、水晶建议、行动提醒，以及生日对应的玛雅本命盘入口。</p>
                    </div>
                    <div class="conversion-actions">
                        <a class="test-link-button" href="contact.html">扫码咨询</a>
                        <a class="test-link-button primary" href="index.html">输入生日，激活我的天赋通道</a>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div class="bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="nav-icon">🔍</i>
            <span>星符查询</span>
        </a>
        <a href="test.html" class="nav-item active">
            <i class="nav-icon">🧭</i>
            <span>测一测</span>
        </a>
        <a href="learn.html" class="nav-item">
            <i class="nav-icon">📘</i>
            <span>学一学</span>
        </a>
        <a href="contact.html" class="nav-item">
            <i class="nav-icon">📞</i>
            <span>联系我</span>
        </a>
    </div>

    <script src="test.js"></script>
</body>

</html>
